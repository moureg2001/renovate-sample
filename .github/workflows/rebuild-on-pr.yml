name: Rebuild base images

on:
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    if: |
      github.actor == 'renovate[bot]' &&
      (contains(github.head_ref, 'golang') ||
       contains(github.head_ref, 'go-lang') ||
       contains(github.head_ref, 'alpine'))
    permissions:
      contents: read
      pull-requests: write
      issues: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # =====================================================
      # Detect which base image was updated
      # =====================================================
      - name: Detect changed image
        id: detect
        run: |
          if echo "${{ github.head_ref }}" | grep -qi "golang\|go-lang"; then
            echo "image=golang" >> $GITHUB_OUTPUT
            echo "label=🔧 golang" >> $GITHUB_OUTPUT
          else
            echo "image=alpine" >> $GITHUB_OUTPUT
            echo "label=📦 alpine" >> $GITHUB_OUTPUT
          fi

      # =====================================================
      # Read base image from Dockerfile (including digest)
      # =====================================================
      - name: Read base image from Dockerfile
        id: base
        run: |
          IMAGE_LINE=$(grep -i "FROM.*${{ steps.detect.outputs.image }}" Dockerfile | head -1 | awk '{print $2}')
          echo "image_ref=${IMAGE_LINE}" >> $GITHUB_OUTPUT
          echo "Base image: ${IMAGE_LINE}"

      # =====================================================
      # Login to GitHub Container Registry (ghcr.io)
      # =====================================================
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =====================================================
      # Build with docker/build-push-action
      # pull: true → equivalent to docker build --pull
      # Dockerfile is NOT modified
      # =====================================================
      - name: Build and push with latest ${{ steps.detect.outputs.image }}
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          pull: true
          tags: ghcr.io/${{ github.repository }}:latest

      # =====================================================
      # Close PR without merging on success
      # On failure: leave PR open, add comment only
      # =====================================================
      - name: Close PR without merging
        if: success()
        run: |
          gh pr close ${{ github.event.pull_request.number }} \
            --comment "✅ Build with new \`${{ steps.detect.outputs.image }}\` successful. PR closed — Dockerfile remains unchanged."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on failure
        if: failure()
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "❌ Build failed — please check the [Actions Log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}). PR remains open for investigation."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =====================================================
      # Update Dependency Dashboard comment
      # Delete old comment, write new one
      # =====================================================
      - name: Update Dependency Dashboard comment
        if: always()
        run: |
          ISSUE_NUMBER=$(gh issue list \
            --search "Dependency Dashboard in:title" \
            --state open \
            --json number,title \
            --jq '.[] | select(.title == "Dependency Dashboard") | .number' \
            | head -1)

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "Dependency Dashboard issue not found — skipping"
            exit 0
          fi

          OLD_COMMENT_ID=$(gh issue comment list "$ISSUE_NUMBER" \
            --json id,body \
            --jq ".[] | select(.body | contains(\"${{ steps.detect.outputs.label }}\")) | .id" \
            | head -1)

          if [ -n "$OLD_COMMENT_ID" ]; then
            gh issue comment delete "$OLD_COMMENT_ID" --yes || true
          fi

          if [ "${{ steps.build.outcome }}" == "success" ]; then
            STATUS="✅ Success"
            FOOTER="> PR closed without merge — Dockerfile remains unchanged."
          else
            STATUS="❌ Failed"
            FOOTER="> Build failed — PR remains open for investigation."
          fi

          DATE=$(date '+%Y-%m-%d %H:%M UTC')
          DIGEST="${{ steps.build.outputs.digest }}"
          OUTPUT_IMAGE="ghcr.io/${{ github.repository }}:latest"
          BASE_IMAGE="${{ steps.base.outputs.image_ref }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          LABEL="${{ steps.detect.outputs.label }}"

          gh issue comment "$ISSUE_NUMBER" --body "## ${LABEL} — Last Build
          | | |
          |---|---|
          | **Date** | ${DATE} |
          | **Status** | ${STATUS} |
          | **Triggered by** | PR #${PR_NUM} |
          | **Base image used** | \`${BASE_IMAGE}\` |
          | **Output image** | \`${OUTPUT_IMAGE}\` |
          | **Output digest** | \`${DIGEST}\` |
          | **Workflow** | [View run](${RUN_URL}) |

          ${FOOTER}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
