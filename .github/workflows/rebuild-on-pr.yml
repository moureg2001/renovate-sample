name: Rebuild base images

on:
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    if: |
      github.actor == 'renovate[bot]' &&
      (contains(github.head_ref, 'golang') ||
       contains(github.head_ref, 'go-lang') ||
       contains(github.head_ref, 'alpine') ||
       contains(github.head_ref, 'pin-dependencies'))
    permissions:
      contents: read
      pull-requests: write
      issues: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Detect changed image
        id: detect
        run: |
          if echo "${{ github.head_ref }}" | grep -qi "golang\|go-lang"; then
            echo "image=golang" >> $GITHUB_OUTPUT
            echo "emoji=🔧" >> $GITHUB_OUTPUT
          elif echo "${{ github.head_ref }}" | grep -qi "alpine"; then
            echo "image=alpine" >> $GITHUB_OUTPUT
            echo "emoji=📦" >> $GITHUB_OUTPUT
          else
            echo "image=base-images" >> $GITHUB_OUTPUT
            echo "emoji=🐳" >> $GITHUB_OUTPUT
          fi

      - name: Read base images from Dockerfile
        id: base
        run: |
          IMAGES=$(grep -i "^FROM" Dockerfile | awk '{print $2}' | tr '\n' ', ' | sed 's/,$//')
          echo "images=${IMAGES}" >> $GITHUB_OUTPUT
          echo "Base images: ${IMAGES}"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          pull: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Close PR without merging
        if: success()
        run: |
          gh pr close ${{ github.event.pull_request.number }} \
            --comment "✅ Build successful with new \`${{ steps.detect.outputs.image }}\` digest. PR closed — Dockerfile remains unchanged."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on failure
        if: failure()
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "❌ Build failed — please check the [Actions Log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}). PR remains open for investigation."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Dependency Dashboard comment
        if: always()
        run: |
          ISSUE_NUMBER=$(gh api \
            repos/${{ github.repository }}/issues \
            --jq '.[] | select(.title == "Dependency Dashboard") | .number' \
            | head -1)

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "Dependency Dashboard issue not found — skipping"
            exit 0
          fi

          MARKER="renovate-build-marker-${{ steps.detect.outputs.image }}"

          OLD_COMMENT_ID=$(gh api \
            repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments \
            --paginate \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
            | head -1)

          if [ -n "$OLD_COMMENT_ID" ]; then
            echo "Deleting old comment: ${OLD_COMMENT_ID}"
            gh api repos/${{ github.repository }}/issues/comments/${OLD_COMMENT_ID} -X DELETE
          fi

          if [ "${{ steps.build.outcome }}" == "success" ]; then
            STATUS="✅ Success"
            FOOTER="> PR closed without merge — Dockerfile remains unchanged."
          else
            STATUS="❌ Failed"
            FOOTER="> Build failed — PR remains open for investigation."
          fi

          DATE=$(date '+%Y-%m-%d %H:%M UTC')
          DIGEST="${{ steps.build.outputs.digest }}"
          OUTPUT_IMAGE="ghcr.io/${{ github.repository }}:latest"
          BASE_IMAGES="${{ steps.base.outputs.images }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EMOJI="${{ steps.detect.outputs.emoji }}"
          IMAGE="${{ steps.detect.outputs.image }}"

          gh api repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments \
            -X POST \
            -f body="${MARKER}
            ## ${EMOJI} ${IMAGE} — Last Build
            | | |
            |---|---|
            | **Date** | ${DATE} |
            | **Status** | ${STATUS} |
            | **Triggered by** | PR #${PR_NUM} |
            | **Base images used** | \`${BASE_IMAGES}\` |
            | **Output image** | \`${OUTPUT_IMAGE}\` |
            | **Output digest** | \`${DIGEST}\` |
            | **Workflow** | [View run](${RUN_URL}) |

            ${FOOTER}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
