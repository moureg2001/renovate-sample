name: Rebuild on Renovate base image PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'

jobs:
  rebuild:
    runs-on: linux
    if: |
      github.actor == 'renovate[bot]' &&
      (contains(github.head_ref, 'golang') ||
       contains(github.head_ref, 'go-lang') ||
       contains(github.head_ref, 'pin-dependencies'))
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read base images from Dockerfile
        id: base
        run: |
          IMAGES=$(grep -i "^FROM" Dockerfile | awk '{print $2}' | tr '\n' ', ' | sed 's/,$//')
          echo "images=${IMAGES}" >> $GITHUB_OUTPUT
          echo "Base images: ${IMAGES}"

      - name: Log in to Harbor registry
        uses: docker/login-action@v4
        with:
          registry: registry.idst.ibaintern.de
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          pull: true
          tags: registry.idst.ibaintern.de/public/ibi/ci-s3-http-server:latest
          cache-from: type=registry,ref=registry.idst.ibaintern.de/public/ibi/ci-s3-http-server:cache
          cache-to: type=registry,ref=registry.idst.ibaintern.de/public/ibi/ci-s3-http-server:cache,mode=max

      - name: Close PR without merging
        if: success()
        run: |
          gh pr close ${{ github.event.pull_request.number }} \
            --comment "✅ Build successful with new golang-builder digest. PR closed — Dockerfile remains unchanged."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_HOST: ${{ github.server_url }}

      - name: Comment on failure
        if: failure()
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "❌ Build failed — please check the [Actions Log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}). PR remains open for investigation."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_HOST: ${{ github.server_url }}

      - name: Update Dependency Dashboard comment
        if: always()
        run: |
          ISSUE_NUMBER=$(gh api \
            repos/${{ github.repository }}/issues \
            --jq '.[] | select(.title == "Dependency Dashboard") | .number' \
            | head -1)

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "Dependency Dashboard issue not found — skipping"
            exit 0
          fi

          MARKER="renovate-build-marker-golang-builder"

          OLD_COMMENT_ID=$(gh api \
            repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments \
            --paginate \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
            | head -1)

          if [ -n "$OLD_COMMENT_ID" ]; then
            echo "Deleting old comment: ${OLD_COMMENT_ID}"
            gh api repos/${{ github.repository }}/issues/comments/${OLD_COMMENT_ID} -X DELETE
          fi

          if [ "${{ steps.build.outcome }}" == "success" ]; then
            STATUS="✅ Success"
            FOOTER="> PR closed without merge — Dockerfile remains unchanged."
          else
            STATUS="❌ Failed"
            FOOTER="> Build failed — PR remains open for investigation."
          fi

          DATE=$(date '+%Y-%m-%d %H:%M UTC')
          DIGEST="${{ steps.build.outputs.digest }}"
          OUTPUT_IMAGE="registry.idst.ibaintern.de/public/ibi/ci-s3-http-server:latest"
          BASE_IMAGES="${{ steps.base.outputs.images }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          gh api repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments \
            -X POST \
            -f body="${MARKER}
            ## 🔧 golang-builder — Last Build
            | | |
            |---|---|
            | **Date** | ${DATE} |
            | **Status** | ${STATUS} |
            | **Triggered by** | PR #${PR_NUM} |
            | **Base images used** | \`${BASE_IMAGES}\` |
            | **Output image** | \`${OUTPUT_IMAGE}\` |
            | **Output digest** | \`${DIGEST}\` |
            | **Workflow** | [View run](${RUN_URL}) |

            ${FOOTER}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_HOST: ${{ github.server_url }}
