name: Rebuild base images

on:
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    # Only for Renovate digest PRs — branch contains 'base-images' (grouped)
    if: |
      github.actor == 'renovate[bot]' &&
      contains(github.head_ref, 'base-images')
    permissions:
      contents: read
      pull-requests: write
      issues: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # =====================================================
      # Read all base images from Dockerfile
      # =====================================================
      - name: Read base images from Dockerfile
        id: base
        run: |
          IMAGES=$(grep -i "^FROM" Dockerfile | awk '{print $2}' | tr '\n' ', ' | sed 's/,$//')
          echo "images=${IMAGES}" >> $GITHUB_OUTPUT
          echo "Base images: ${IMAGES}"

      # =====================================================
      # Login to GitHub Container Registry (ghcr.io)
      # =====================================================
      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =====================================================
      # Build with docker/build-push-action
      # pull: true → pulls latest base images
      # Dockerfile is NOT modified
      # =====================================================
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          pull: true
          tags: ghcr.io/${{ github.repository }}:latest

      # =====================================================
      # Close PR without merging on success
      # On failure: leave PR open, add comment only
      # =====================================================
      - name: Close PR without merging
        if: success()
        run: |
          gh pr close ${{ github.event.pull_request.number }} \
            --comment "✅ Build successful with updated base images. PR closed — Dockerfile remains unchanged."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on failure
        if: failure()
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "❌ Build failed — please check the [Actions Log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}). PR remains open for investigation."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =====================================================
      # Update Dependency Dashboard comment
      # Uses gh api + startswith for reliable marker detection
      # =====================================================
      - name: Update Dependency Dashboard comment
        if: always()
        run: |
          ISSUE_NUMBER=$(gh api \
            repos/${{ github.repository }}/issues \
            --jq '.[] | select(.title == "Dependency Dashboard") | .number' \
            | head -1)

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "Dependency Dashboard issue not found — skipping"
            exit 0
          fi

          echo "Dependency Dashboard issue: #${ISSUE_NUMBER}"

          MARKER="renovate-build-marker-base-images"

          # Find and delete old comment using gh api + startswith
          OLD_COMMENT_ID=$(gh api \
            repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments \
            --paginate \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
            | head -1)

          if [ -n "$OLD_COMMENT_ID" ]; then
            echo "Deleting old comment: ${OLD_COMMENT_ID}"
            gh api \
              repos/${{ github.repository }}/issues/comments/${OLD_COMMENT_ID} \
              -X DELETE
          fi

          if [ "${{ steps.build.outcome }}" == "success" ]; then
            STATUS="✅ Success"
            FOOTER="> PR closed without merge — Dockerfile remains unchanged."
          else
            STATUS="❌ Failed"
            FOOTER="> Build failed — PR remains open for investigation."
          fi

          DATE=$(date '+%Y-%m-%d %H:%M UTC')
          DIGEST="${{ steps.build.outputs.digest }}"
          OUTPUT_IMAGE="ghcr.io/${{ github.repository }}:latest"
          BASE_IMAGES="${{ steps.base.outputs.images }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          gh api \
            repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments \
            -X POST \
            -f body="${MARKER}
            ## 🐳 Base Images — Last Build
            | | |
            |---|---|
            | **Date** | ${DATE} |
            | **Status** | ${STATUS} |
            | **Triggered by** | PR #${PR_NUM} |
            | **Base images used** | \`${BASE_IMAGES}\` |
            | **Output image** | \`${OUTPUT_IMAGE}\` |
            | **Output digest** | \`${DIGEST}\` |
            | **Workflow** | [View run](${RUN_URL}) |

            ${FOOTER}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
